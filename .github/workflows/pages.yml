name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types:
      - masterbelt-main-updated

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Masterbelt source token
        id: masterbelt-source-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.MASTERBELT_APP_CLIENT_ID }}
          private-key: ${{ secrets.MASTERBELT_APP_PRIVATE_KEY }}
          owner: masterbelt
          repositories: masterbelt

      - name: Checkout Masterbelt source
        uses: actions/checkout@v6
        with:
          repository: masterbelt/masterbelt
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_sha || 'main' }}
          path: masterbelt-source
          token: ${{ steps.masterbelt-source-token.outputs.token }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26.2.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Masterbelt syntax dependencies
        run: pnpm --dir masterbelt-source/internal/masterbelt/syntax install

      - name: Generate specs
        run: pnpm generate:spec masterbelt-source

      - name: Check formatting and lint
        run: pnpm biome:check

      - name: Type check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
