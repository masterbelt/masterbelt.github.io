# 3 日の cooldown で各更新を新しいバージョンが枯れるまで保留する。pnpm の
# minimumReleaseAge（pnpm-workspace.yaml）と合わせ、インストールが「新しすぎる」と
# 拒否するバージョンを Dependabot が提案しないようにする。
version: 2
updates:
  # npm (pnpm) 依存
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      # minor / patch はまとめて1PRに（ノイズ削減）
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
